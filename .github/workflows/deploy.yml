name: Build & Deploy on EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Copy source code to EC2
      - name: Copy source to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/dtdc-app"

      # 2. Build and Run on EC2
      - name: Build and Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Checking DB_ENDPOINT: '${{ secrets.DB_ENDPOINT }}'"
            echo "Checking DB_NAME: '${{ secrets.DB_NAME }}'"
            echo "Checking DB_USER: '${{ secrets.DB_USER }}'"
            echo "Checking DB_PASSWORD: '${{ secrets.DB_PASSWORD }}'"
            cd /home/ubuntu/dtdc-app

            # Build image locally on the server
            docker build -t dtdc-app:latest .

            docker stop dtdc-app || true
            docker rm dtdc-app || true

            docker run -d \
              --name dtdc-app \
              --restart always \
              -p 8000:8000 \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e DB_ENDPOINT=${{ secrets.DB_ENDPOINT }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              dtdc-app:latest
            
            # Optional: Clean up dangling images to save space
            docker image prune -f